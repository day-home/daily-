<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>하루 일정표</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div class="title-area">
        <p class="small-title">DAILY PLAN</p>
        <h1>하루 일정표</h1>
      </div>

      <label class="date-picker">
        날짜
        <input id="dateInput" type="date" />
      </label>
    </header>

    <section class="planner-layout" aria-label="원형 하루 플래너">
      <article class="planner-card">
        <div class="card-heading">
          <h2>24시간 원형 플래너</h2>
          <p>원판을 드래그해서 시간을 선택하세요.</p>
        </div>

        <div class="svg-stage">
          <svg id="plannerSvg" viewBox="-280 -280 560 560" role="img" aria-label="24시간 원형 플래너"></svg>
          <div class="touch-hint">드래그해서 시간 선택</div>
        </div>
      </article>

      <aside class="side-panel">
        <form id="eventForm" class="event-form">
          <div class="panel-title-row">
            <div>
              <p class="small-title">ADD PLAN</p>
              <h2>일정 추가</h2>
            </div>
            <button type="button" id="deleteButton" class="sub-button danger" hidden>삭제</button>
          </div>

          <label>
            제목
            <input id="titleInput" type="text" placeholder="예: 학교, 연습, 밥, 휴식" autocomplete="off" />
          </label>

          <div class="time-row">
            <label>
              시작
              <input id="startInput" type="time" step="300" value="08:00" />
            </label>

            <label>
              끝
              <input id="endInput" type="time" step="300" value="09:00" />
            </label>
          </div>

          <label>
            색상
            <select id="colorInput">
              <option value="#dcecff">수면 하늘</option>
              <option value="#e3d8ff">연습 보라</option>
              <option value="#fff39a">식사 노랑</option>
              <option value="#ffc7bd">학교 코랄</option>
              <option value="#ffdcea">휴식 분홍</option>
              <option value="#d9f3e4">이동 민트</option>
            </select>
          </label>

          <button class="primary-button" type="submit">추가하기</button>
        </form>

        <section class="panel-section">
          <div class="section-heading">
            <h3>오늘의 합계</h3>
            <button id="clearButton" type="button" class="sub-button">비우기</button>
          </div>
          <ul id="summaryList" class="summary-list"></ul>
        </section>

        <section class="panel-section">
          <h3>일정 목록</h3>
          <ul id="eventList" class="event-list"></ul>
        </section>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
